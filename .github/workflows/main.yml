      # [hostkey] formait = SHA256:Abcdefghijklmnopqrstuvwxyz0123456789

  mirror:
    name: Mirror to Bitbucket
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
        with:
          fetch-depth: 0 # <-- clone with complete history
      - run: |
          git push https://${{secrets.BITBUCKET_USERNAME}}:${{secrets.BITBUCKET_PASSWORD}}@bitbucket.org/${{secrets.BITBUCKET_REPO_OWNER}}/${{secrets.BITBUCKET_REPO_NAME}}.git --all --force
