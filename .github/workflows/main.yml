  build_apk:
    if: github.event.pull_request.merged == true || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    name: Build Flutter (Android)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master
    - uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '18'
    - uses: subosito/flutter-action@v2
      with:
          flutter-version: '3.3.1'
          channel: 'stable'
    - run: flutter pub get
    - run: flutter build apk --split-per-abi
    # - run: flutter build appbundle
    - name: Upload Android Build
      uses: actions/upload-artifact@master
      with:
        name: android-build
        path: build/app/outputs/apk/release
        # path: build/app/outputs/bundle/release # require linking to google play
        retention-days: 1
          
  deploy_web:
    name: Deploy Web to Firebase Hosting
    needs: build_web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@master
      - name: Download Artifact
        uses: actions/download-artifact@master
        with:
          name: web-build
          path: web-build
      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting --public web-build
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: default
              
